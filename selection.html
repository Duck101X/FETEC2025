<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auxílio TCC - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    h1{
        line-height: 1.5;
    }

</style>

<body>

    <div id="loginSelect" class="center fade-in">
        <h1>Login <br>Aluno - Professor</h1>
        <button class="btn" onclick="window.location.href='./aluno/aluno_login.php'">Sou Aluno</button>
        <button class="btn" onclick="window.location.href='./professor/professor_login.php'">Sou Professor</button>
    </div>


    <div id="loginForm" class="center hidden fade-in">
        <h2 id="loginTitle"></h2>
        <input class="input" type="text" placeholder="Usuário">
        <input class="input" type="password" placeholder="Senha">
        <button class="btn" onclick="login()">Entrar</button>
        <button class="btn-secondary" onclick="backToSelect()">Voltar</button>
    </div>


    <script src="script.js"></script>

</body>

</html>
